# fly.toml app configuration file generated for legalchain-app on 2026-03-28T17:10:35-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'legalchain-app'
primary_region = 'iad'

[build]

[deploy]
  strategy = 'rolling'

[env]
  HOST = '0.0.0.0'
  PORT = '3000'

[[mounts]]
  source = 'legalchain_uploads'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
    method = 'get'
    path = '/'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
  cpus = 2
  memory_mb = 2048
